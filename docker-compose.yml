version: '3.8'

networks:
  fraud-network:
    driver: bridge

# volumes:
#   kafka-data:
#   postgres-data:
#   spark-checkpoints:

services:

  # ── ZOOKEEPER ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - fraud-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── KAFKA ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - fraud-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:29092,
        PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── KAFKA UI ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - fraud-network
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fraud-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: unless-stopped

  # ── POSTGRESQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - fraud-network
    environment:
      POSTGRES_DB: fraud_detection
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL",
             "pg_isready -U fraud_user -d fraud_detection"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PRODUCER ──────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: fraud-producer
    networks:
      - fraud-network
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRANSACTIONS: raw_transactions
      TRANSACTIONS_PER_SECOND: 100
      DATASET_PATH: /data/creditcard.csv
      PROMETHEUS_PORT: 8000
    volumes:
      - ./data:/data:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/metrics').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── SPARK STREAMING ───────────────────────────────────────
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: fraud-spark
    networks:
      - fraud-network
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRANSACTIONS: raw_transactions
      KAFKA_TOPIC_ALERTS: fraud_alerts
      MODEL_PATH: /model/fraud_model.pkl
      SCALER_PATH: /model/scaler.pkl
      FRAUD_THRESHOLD: 0.5
      SPARK_BATCH_INTERVAL: 5
      PROMETHEUS_PORT: 8001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: fraud_detection
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
    volumes:
      - ./model:/model:ro
      - spark-checkpoints:/tmp/spark-checkpoints
    ports:
      - "4040:4040"     # Spark UI
      - "8001:8001"     # Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/metrics').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

    # Add to docker-compose.yml (under services section)

  # ── PROMETHEUS ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.1
    container_name: prometheus
    networks:
      - fraud-network
    depends_on:
      producer:
        condition: service_healthy
      spark:
        condition: service_healthy
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"     # Prometheus UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready | grep -qi ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  # ── GRAFANA ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-enterprise:10.2.0
    container_name: grafana
    networks:
      - fraud-network
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/fraud_dashboard.json"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/provisioning/dashboards/fraud_dashboard.json:/var/lib/grafana/dashboards/fraud_dashboard.json
    ports:
      - "3000:3000"     # Grafana UI
    restart: unless-stopped

# Add to volumes section (at the bottom of file)
volumes:
  kafka-data:
  postgres-data:
  spark-checkpoints:
  prometheus-data:
  grafana-data: