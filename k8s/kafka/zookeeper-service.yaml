# k8s/kafka/zookeeper-service.yaml

# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-headless
  namespace: fraud-detection
  labels:
    app: zookeeper
spec:
  clusterIP: None          # headless
  selector:
    app: zookeeper
  ports:
    - port: 2181
      name: client
    - port: 2888
      name: server
    - port: 3888
      name: leader-election

---
# Regular service for client access
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: fraud-detection
  labels:
    app: zookeeper
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
      name: client